            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:18,fontWeight:700,color:c,lineHeight:1}}>{cnt}</div>
            <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.08em',marginTop:2}}>{sev}</div>
          </div>))}
        <div style={{flex:2,background:'var(--pan)',border:'1px solid var(--bdr)',borderRadius:3,padding:'5px 8px',display:'flex',alignItems:'center'}}>
          <div style={{fontSize:8,color:'var(--txt)',lineHeight:1.4}}>{anomalyResult.summary||''}</div>
        </div>
      </div>
      {anomalyResult.intent_mode&&(
        <div style={{flexShrink:0,padding:'4px 11px',background:'rgba(0,212,170,.05)',borderBottom:'1px solid rgba(0,212,170,.15)',fontSize:7.5,color:'var(--cyan)'}}>
          ✦ Intent-correlated scan — anomalies include impact relative to the submitted intent
        </div>
      )}

      <div className="pb">
        {filtered.length===0&&<div style={{textAlign:'center',padding:'20px',color:'var(--mut)',fontSize:8.5}}>No {filter==='ALL'?'':filter} anomalies detected</div>}
        {filtered.map((a,i)=>(
          <div key={i} className={`anom-card anom-${a.severity}`} style={{marginBottom:6}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
              <div>
                <span style={{fontSize:9.5,fontWeight:700,color:'#fff'}}>{a.title}</span>
                <div style={{display:'flex',gap:5,marginTop:3}}>
                  <span style={{fontSize:7,fontWeight:700,padding:'1px 5px',borderRadius:2,textTransform:'uppercase',
                    background:`${SEV_COLOR[a.severity]||'var(--mut)'}22`,color:SEV_COLOR[a.severity]||'var(--mut)',
                    border:`1px solid ${SEV_COLOR[a.severity]||'var(--mut)'}44`}}>{a.severity}</span>
                  <span style={{fontSize:7,fontWeight:700,padding:'1px 5px',borderRadius:2,textTransform:'uppercase',
                    background:'rgba(45,140,240,.1)',color:'var(--blue)',border:'1px solid rgba(45,140,240,.2)'}}>{a.category}</span>
                </div>
              </div>
            </div>
            {a.description&&<div style={{fontSize:8.5,color:'var(--txt)',marginBottom:5,lineHeight:1.5}}>{a.description}</div>}
            {a.evidence&&(
              <div style={{marginBottom:5}}>
                <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:2}}>Evidence</div>
                <pre style={{fontSize:8,color:'var(--amber)',background:'rgba(255,176,32,.05)',border:'1px solid rgba(255,176,32,.15)',borderRadius:2,padding:'4px 7px',whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{a.evidence}</pre>
              </div>)}
            {a.fix&&(
              <div>
                <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:2}}>Fix</div>
                <pre style={{fontSize:8,color:'var(--green)',background:'rgba(0,230,118,.05)',border:'1px solid rgba(0,230,118,.15)',borderRadius:2,padding:'4px 7px',whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{a.fix}</pre>
              </div>)}
          </div>))}
      </div>
    </div>
  );
}

// ─── CHAT PANEL ───────────────────────────────────────────────────────────
function ChatPanel({analysisContext,port}){
  const [msgs,setMsgs]=useState([{role:'ai',text:'Hi! I have access to the full pipeline analysis results. Ask me anything about the configuration, change intent, impact, topology, decisions, or network state. (Powered by Claude)'}]);
  const [input,setInput]=useState('');
  const [thinking,setThinking]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

  const send=async()=>{
    if(!input.trim()||thinking) return;
    const q=input.trim();
    setInput('');
    setMsgs(prev=>[...prev,{role:'user',text:q}]);
    setThinking(true);
    try{
      const resp=await fetch(`${API}/chat`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({question:q,context:analysisContext,port}),
      });
      const data=await resp.json();
      setMsgs(prev=>[...prev,{role:'ai',text:data.answer||'No answer returned.'}]);
    }catch(e){
      setMsgs(prev=>[...prev,{role:'ai',text:`Error: ${e.message}. Is the backend running?`}]);
    }finally{setThinking(false)}
  };

  return(
    <div className="chat-wrap">
      <div className="chat-msgs">
        {msgs.map((m,i)=>(
          <div key={i} className={`chat-bubble ${m.role==='user'?'chat-user':'chat-ai'}`}>
            {m.role==='ai'&&<div style={{fontSize:7,color:'var(--mut)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.1em'}}>Claude · NetBuilder AI</div>}
            <div style={{whiteSpace:'pre-wrap',lineHeight:1.6}}>{m.text}</div>
          </div>))}
        {thinking&&<div className="chat-bubble chat-ai chat-thinking">Thinking...</div>}
        <div ref={endRef}/>
      </div>
      <div className="chat-input-row">
        <input className="chat-input" value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}}
          placeholder="Ask about config, intent, impact, decision... (Claude, Enter to send)"/>
        <button className="btn btn-run" style={{height:30,padding:'0 12px',fontSize:10}} onClick={send} disabled={thinking}>
          {thinking?'...':'Send'}
        </button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────
const App=()=>{
  const [intent,setIntent]=useState('no router ospf 9\nno network 9.9.0.0 0.0.0.255 area 0');
  const [port,setPort]=useState(5017);
  const [provider,setProvider]=useState('local');  // 'claude' | 'local'
  const [providerSwitching,setProviderSwitching]=useState(false);

  const switchProvider=async(newProv)=>{
    setProviderSwitching(true);
    try{
      const r=await fetch(`${API}/provider`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({provider:newProv}),
      });
      const d=await r.json();
      setProvider(newProv);
      setLlmStatus(d);
      addLogs([`[LLM] Provider switched to: ${newProv==='claude'?'Claude (cloud)':'Ollama (local)'}`]);
    }catch(e){
      addLogs([`[LLM] Provider switch failed: ${e.message}`]);
    }finally{setProviderSwitching(false)}
  };

  const resetClaude=async()=>{
    const r=await fetch(`${API}/provider`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:'reset_claude'})});
    const d=await r.json();
    setLlmStatus(prev=>({...prev,claude_balance_ok:true}));
    addLogs(['[LLM] Claude balance reset — retrying Claude on next call']);
  };

  // LLM status
  const [llmStatus,setLlmStatus]=useState(null);

  // running states
  const [running,setRunning]=useState(false);
  const [discovering,setDiscovering]=useState(false);
  const [simRunning,setSimRunning]=useState(false);
  const [anomRunning,setAnonRunning]=useState(false);

  const [stageStatus,setStageStatus]=useState(Array(5).fill('idle'));
  const [result,setResult]=useState(null);
  const [simResult,setSimResult]=useState(null);
  const [anomalyResult,setAnomalyResult]=useState(null);
  const [mcpResult,setMcpResult]=useState(null);
  const [mcpRunning,setMcpRunning]=useState(false);
  const [mcpPhase,setMcpPhase]=useState(-1);  // 0-7 current phase
  const [agentResult,setAgentResult]=useState(null);
  const [agentRunning,setAgentRunning]=useState(false);
  const [savedInvMeta,setSavedInvMeta]=useState(null);

  const [logs,setLogs]=useState(['> NetBuilder Pro v5 ready.',"> Use 'Discover' to fetch device inventory, then 'Run Pipeline' for analysis."]);
  const [activeTab,setActiveTab]=useState('decision');
  const logEndRef=useRef(null);
  useEffect(()=>{logEndRef.current?.scrollIntoView({behavior:'smooth'})},[logs]);
  const addLogs = newLogs => setLogs(prev=>[...prev,...newLogs]);

  // Poll LLM status on mount and after each pipeline run
  const pollLlmStatus=useCallback(()=>{
    fetch(`${API}/llm_status`).then(r=>r.json()).then(setLlmStatus).catch(()=>{});
  },[]);

  useEffect(()=>{
    pollLlmStatus();
    // Poll every 30s to catch credit restoration
    const t=setInterval(pollLlmStatus,30000);
    return ()=>clearInterval(t);
  },[pollLlmStatus]);

  // Check for saved inventory on mount
  useEffect(()=>{
    fetch(`${API}/saved_inventory`).then(r=>r.json())
      .then(d=>{if(d[port])setSavedInvMeta(d[port])})
      .catch(()=>{});
  },[port]);

  // DISCOVER
  const discover=async()=>{
    setDiscovering(true);
    setLogs(['[DISCOVER] Connecting to device...']);
    try{
      const resp=await fetch(`${API}/discover`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({port}),
      });
      const data=await resp.json();
      if(data.error){
        addLogs([...(data.logs||[]),`[FATAL] ${data.error}`]);
      } else {
        addLogs(data.logs||[]);
        // Store inventory in result so UI can show it
        setResult(prev=>({
          ...(prev||{}),
          inventory: data.inventory,
          physical_topology: data.physical_topology,
          topology: data.topology,
          critical_nodes: data.critical_nodes,
          digital_twin: prev?.digital_twin || {},
        }));
        setSavedInvMeta({timestamp:data.timestamp, interface_count:(data.inventory?.interfaces||[]).length});
        setActiveTab('inventory');
      }
    }catch(e){
      addLogs([`[FATAL] Cannot reach backend: ${e.message}`]);
    }finally{setDiscovering(false)}
  };

  // PIPELINE
  const run=async()=>{
    setRunning(true);
    setSimResult(null);
    setStageStatus(Array(5).fill('idle'));
    setLogs([`[INIT] Pipeline starting | provider=${provider} | port=${port}`]);
    let curStage=-1;
    const poll=setInterval(()=>{
      setLogs(prev=>{
        for(let i=prev.length-1;i>=0;i--){
          const m=prev[i].match(/STAGE (\d)/);
          if(m){
            const s=parseInt(m[1])-1;
            if(s!==curStage){
              curStage=s;
              setStageStatus(ss=>{const ns=[...ss];for(let j=0;j<s;j++)ns[j]='done';ns[s]='active';return ns});
            }
            break;
          }
        }
        return prev;
      });
    },400);
    const _runController=new AbortController();
    const _runTimeout=setTimeout(()=>_runController.abort(),600000); // 10min timeout
    try{
      const resp=await fetch(`${API}/analyze`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({port,intent,provider,use_saved_inventory:!!savedInvMeta}),
        signal:_runController.signal,
      });
      clearTimeout(_runTimeout);
      const data=await resp.json();
      clearInterval(poll);
      if(data.error){
        addLogs([...(data.logs||[]),`[FATAL] ${data.error}`]);
        setStageStatus(ss=>{const ns=[...ss];const idx=ns.findIndex(x=>x==='active');if(idx>=0)ns[idx]='error';return ns});
      } else {
        setResult(data);
        if(data.logs) setLogs(data.logs);
        setStageStatus(Array(5).fill('done'));
        setActiveTab('decision');
        if(data.used_saved_inventory){
          addLogs(['[INIT] Used saved inventory — Stages 1-2 were skipped.']);
        }
      }
    }catch(e){
      clearInterval(poll);
      clearTimeout(_runTimeout);
      if(e.name==='AbortError'){
        addLogs(['[FATAL] Pipeline timed out (10 min). Backend may still be running. Check /health']);
      } else {
        addLogs([`[FATAL] ${e.message}`,'[FATAL] Ensure backend is running: python app6.py']);
      }
      setStageStatus(ss=>{const ns=[...ss];ns[0]='error';return ns});
    }finally{setRunning(false);pollLlmStatus()}
  };

  // SIMULATE
  const simulate=async()=>{
    setSimRunning(true);
    addLogs(['[SIM] Config simulation starting...']);
    try{
      const resp=await fetch(`${API}/simulate`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({port,intent,provider,genie_diff:true,features:['interface','routing','ospf','bgp','acl']}),
      });
      const data=await resp.json();
      addLogs(data.logs||[]);
      setSimResult(data);
      setActiveTab('simulate');
    }catch(e){
      addLogs([`[SIM] Error: ${e.message}`]);
      setSimResult({error:e.message});
    }finally{setSimRunning(false)}
  };

  // ANOMALY (standalone on-demand)
  const scanAnomalies=async(intentMode=false)=>{
    setAnonRunning(true);
    addLogs([`[ANOMALY] Scan starting (intent_mode=${intentMode})...`]);
    try{
      const resp=await fetch(`${API}/anomalies`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({port,intent:intentMode?intent:'',provider,intent_mode:intentMode}),
      });
      const data=await resp.json();
      addLogs(data.logs||[]);
      setAnomalyResult(data);
      setActiveTab('anomaly');
    }catch(e){
      addLogs([`[ANOMALY] Error: ${e.message}`]);
    }finally{setAnonRunning(false)}
  };

  // MCP PIPELINE — Claude tool-calling loop
  const runMcpPipeline=async()=>{
    setMcpRunning(true);
    setMcpPhase(0);
    setMcpResult(null);
    addLogs([
      '[PIPELINE] ═══ Enterprise Network Change Orchestration ═══',
      '[PHASE:0] LLM Intent Analysis — identifying affected domains...',
    ]);
    const _ctrl=new AbortController();
    const _timeout=setTimeout(()=>_ctrl.abort(),600000); // 10min timeout
    // Phase tracker (polls logs for phase markers)
    const phaseMarkers=['[PHASE:0]','[PHASE:1]','[PHASE:2]','[PHASE:3]','[PHASE:4]','[PHASE:5]','[PHASE:6]','[PHASE:7]'];
    const _phaseTimer=setInterval(()=>{
      setLogs(prev=>{
        for(let i=prev.length-1;i>=0;i--){
          for(let p=7;p>=0;p--){
            if(String(prev[i]||'').includes(phaseMarkers[p])){
              setMcpPhase(p);
              return prev;
            }
          }
        }
        return prev;
      });
    },600);
    try{
      const resp=await fetch(`${API}/mcp_pipeline`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({port,intent,provider}),
        signal:_ctrl.signal,
      });
      clearTimeout(_timeout);
      if(!resp.ok){
        const err=await resp.json().catch(()=>({error:`HTTP ${resp.status}`}));
        addLogs([`[PIPELINE:ERROR] ${err.error||resp.status}`, ...(err.logs||[])]);
        setMcpPhase(-1);
        return;
      }
      const data=await resp.json();
      addLogs(data.logs||[]);
      if(data.verdict){
        addLogs([
          `[PIPELINE] ✓ Complete`,
          `[PIPELINE] Verdict: ${data.verdict} | Risk: ${Math.round((data.risk_score||0)*100)}%`,
          `[PIPELINE] Provider: ${data.provider||'?'} | Domains: ${(data.domains_identified||[]).join(', ')||'from agents'}`,
          `[PIPELINE] Agents: ${(data.selected_agents||[]).join(', ')} | Risks: ${(data.agent_risk_indicators||[]).length}`,
        ]);
      }
      setMcpPhase(8);
      setMcpResult(data);
      setActiveTab('mcp');
      pollLlmStatus();
    }catch(e){
      clearTimeout(_timeout);
      if(e.name==='AbortError'){
        addLogs(['[PIPELINE] Timed out (10min). Device may be unreachable.','[PIPELINE] Check cached inventory: run Discover first.']);
      } else {
        addLogs([`[PIPELINE:ERROR] ${e.message}`]);
      }
      setMcpPhase(-1);
    }finally{
      clearInterval(_phaseTimer);
      setMcpRunning(false);
    }
  };

  // DOMAIN EXPERT AGENTS
  const runAgentAnalysis=async()=>{
    setAgentRunning(true);
    addLogs(['[AGENTS] Running domain expert agents...']);
    const _agCtrl=new AbortController();
    const _agTimeout=setTimeout(()=>_agCtrl.abort(),180000); // 3min timeout
    try{
      const resp=await fetch(`${API}/agent_analysis`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({port,intent,provider}),
        signal:_agCtrl.signal,
      });
      clearTimeout(_agTimeout);
      const data=await resp.json();
      setAgentResult(data);
      setActiveTab('agents');
      addLogs(data.logs||[]);
      const riskCount=(data.all_risk_indicators||[]).length;
      addLogs([`[AGENTS] Complete — ${riskCount} risk indicator(s) found`]);
    }catch(e){
      clearTimeout(_agTimeout);
      if(e.name==='AbortError'){
        addLogs(['[AGENTS] Timed out (3min). Backend may still be processing.']);
      } else {
        addLogs([`[AGENTS] Error: ${e.message}`]);
      }
    }finally{setAgentRunning(false)}
  };

  // TAKE SNAPSHOT (pre or post)
  const takeSnapshot=async(label='pre')=>{
    addLogs([`[SNAPSHOT] Taking ${label} state snapshot...`]);
    try{
      const resp=await fetch(`${API}/take_snapshot`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({port,label,features:['interface','routing','ospf','bgp','acl','cdp']}),
      });
      const data=await resp.json();
      addLogs(data.logs||[]);
      addLogs([`[SNAPSHOT] ${label.toUpperCase()} snapshot taken. Features: ${(data.features||[]).join(', ')}`]);
    }catch(e){
      addLogs([`[SNAPSHOT] Error: ${e.message}`]);
    }
  };

  const parsed = result?parseDecision(result.decision):null;
  const vc = parsed?vcls(parsed.verdict):'';

  // Analysis context for chat
  const chatContext = {
    decision: result?.decision||'',
    classification: result?.classification||{},
    blast_radius: result?.blast_radius||{},
    validation: result?.validation||{},
    topology: result?.topology||{},
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>

      {/* HEADER */}
      <div className="hdr">
        <div className="logo">
          <div className="logo-hex"></div>
          <div>
            <div className="logo-t">NetBuilder <span>Pro v6</span></div>
            <div className="logo-s">MCP · Genie Diff · Netmiko · AI SRE Platform</div>
          </div>
        </div>
        <div className="hctrl">
          {/* LLM Provider Selector */}
          <div style={{display:'flex',alignItems:'center',gap:6,borderRight:'1px solid var(--bdr)',paddingRight:14,marginRight:4}}>
            <div>
              <div className="cl" style={{marginBottom:3}}>LLM Provider</div>
              <div style={{display:'flex',gap:3}}>
                <button onClick={()=>switchProvider('claude')} disabled={providerSwitching}
                  style={{padding:'2px 8px',fontSize:8,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',
                    background:provider==='claude'?'rgba(0,212,170,.15)':'transparent',
                    color:provider==='claude'?'var(--cyan)':'var(--mut)',
                    border:`1px solid ${provider==='claude'?'var(--cyan)':'var(--bdr)'}`,
                    borderRadius:2,cursor:'pointer',
                    opacity:(llmStatus&&!llmStatus.anthropic_key_set)?0.4:1}}
                  title={llmStatus&&!llmStatus.anthropic_key_set?'ANTHROPIC_API_KEY not set':'Claude (Haiku)'}>
                  ⬡ Claude
                  {llmStatus&&(!llmStatus.claude_balance_ok)&&<span style={{color:'var(--rose)',marginLeft:4}}>!</span>}
                </button>
                <button onClick={()=>switchProvider('local')} disabled={providerSwitching}
                  style={{padding:'2px 8px',fontSize:8,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',
                    background:provider==='local'?'rgba(0,230,118,.12)':'transparent',
                    color:provider==='local'?'var(--green)':'var(--mut)',
                    border:`1px solid ${provider==='local'?'var(--green)':'var(--bdr)'}`,
                    borderRadius:2,cursor:'pointer'}}>
                  ⬤ Ollama
                </button>
              </div>
            </div>
            {llmStatus&&!llmStatus.claude_balance_ok&&provider==='claude'&&(
              <button onClick={resetClaude}
                style={{padding:'2px 7px',fontSize:7,color:'var(--amber)',border:'1px solid var(--amber)',
                  background:'rgba(255,176,32,.1)',borderRadius:2,cursor:'pointer'}}>
                Reset
              </button>)}
          </div>
          {/* Auto-fallback indicator */}
          {llmStatus&&llmStatus.selected_provider==='claude'&&!llmStatus.claude_balance_ok&&(
            <div style={{fontSize:7.5,color:'var(--amber)',borderRight:'1px solid var(--bdr)',paddingRight:10,marginRight:4}}>
              ⚡ Fallback: Ollama
            </div>)}
          <div className="cg"><div className="cl">GNS3 Port</div>
            <input className="ci" type="number" value={port} onChange={e=>setPort(parseInt(e.target.value))}/>
          </div>
          {/* ON-DEMAND buttons — Ollama */}
          <button className={`btn btn-disc${discovering?' running':''}`} onClick={discover} disabled={discovering||running}
            title="Discover device: inventory, topology, CDP/LLDP [Ollama]">
            {discovering?'⬡ SCANNING...':'⬡ DISCOVER [Ollama]'}
          </button>
          <button className={`btn btn-sim${simRunning?' running':''}`} onClick={simulate} disabled={simRunning||running}
            title="Simulate intent on running config [Ollama]">
            {simRunning?'⬡ SIMULATING...':'⬤ SIMULATE'}
          </button>
          <button className={`btn btn-anom${anomRunning?' running':''}`} onClick={()=>scanAnomalies(false)} disabled={anomRunning||running}
            title="Scan for config anomalies [Ollama]">
            {anomRunning?'⬡ SCANNING...':'⚠ ANOMALIES [Ollama]'}
          </button>
          {/* PIPELINE button — Claude */}
          <button className={`btn btn-run${running?' running':''}`} onClick={run} disabled={running}
            title={`Run full analysis pipeline [${provider==='claude'?'Claude':'Ollama'}]`}>
            {running?'⬡ RUNNING...':`▶ PIPELINE [${provider==='claude'?(llmStatus&&!llmStatus.claude_balance_ok?'Ollama⚡':'Claude'):provider==='local'?'Ollama':'?'}]`}
          </button>
          {/* MCP PIPELINE — Claude tool-calling loop */}
          <button className={`btn${mcpRunning?' running':''}`} onClick={runMcpPipeline} disabled={mcpRunning||running}
            title="Supervisor Agent → Domain Agents → MCP Tools → Netmiko SSH → Genie JSON → Claude Analysis"
            style={{background:'linear-gradient(135deg,#1a1a3a,var(--violet))',color:'#fff',height:32,padding:'0 12px',border:'none',borderRadius:3,fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',cursor:'pointer',opacity:(mcpRunning||running)?0.5:1}}>
            {mcpRunning?'⬡ PIPELINE...':'⬡ MCP PIPELINE'}
          </button>
          {/* DOMAIN EXPERT AGENTS */}
          <button className={`btn${agentRunning?' running':''}`} onClick={runAgentAnalysis} disabled={agentRunning||running}
            title="Run domain expert agents: ospf/bgp/interface/acl/routing/cdp/vlan"
            style={{background:'linear-gradient(135deg,#1a2a1a,var(--green))',color:'#000',height:32,padding:'0 12px',border:'none',borderRadius:3,fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',cursor:'pointer',opacity:(agentRunning||running)?0.5:1}}>
            {agentRunning?'⊕ AGENTS...':'⊕ AGENTS (via MCP)'}
          </button>
          {/* SNAPSHOT buttons */}
          <button onClick={()=>takeSnapshot('pre')} disabled={running||mcpRunning} title="Take Genie PRE snapshot"
            style={{height:32,padding:'0 8px',border:'1px solid var(--cyan)',borderRadius:3,background:'transparent',color:'var(--cyan)',fontFamily:"'IBM Plex Mono',monospace",fontSize:8,fontWeight:700,cursor:'pointer',opacity:(running||mcpRunning)?0.4:1}}>📸PRE</button>
          <button onClick={()=>takeSnapshot('post')} disabled={running||mcpRunning} title="Take Genie POST snapshot"
            style={{height:32,padding:'0 8px',border:'1px solid var(--amber)',borderRadius:3,background:'transparent',color:'var(--amber)',fontFamily:"'IBM Plex Mono',monospace",fontSize:8,fontWeight:700,cursor:'pointer',opacity:(running||mcpRunning)?0.4:1}}>📸POST</button>
        </div>
      </div>

      {/* PIPELINE BAR */}
      <div className="pipe">
        {STAGES.map((s,i)=>(
          <div key={s.id} className={`ps ${stageStatus[i]}`}>
            <div className="sn">{stageStatus[i]==='done'?'✓':stageStatus[i]==='error'?'✕':(i+1)}</div>
            <div><div className="snm">{s.name}</div><div className="stch">{s.tech}</div></div>
          </div>))}
      </div>

      {/* MCP PIPELINE PHASE BAR — shown when mcpRunning or mcpResult exists */}
      {(mcpRunning||mcpResult)&&(
        <div style={{flexShrink:0,display:'flex',alignItems:'stretch',background:'rgba(0,0,16,.6)',
          borderBottom:'1px solid rgba(0,212,170,.2)',height:36,padding:'0 18px',gap:2,overflowX:'auto'}}>
          {MCP_PHASES.map((ph,i)=>{
            const done = mcpPhase > i;
            const active = mcpPhase === i;
            const err = mcpPhase === -1 && i === 0;
            const c = done?'var(--cyan)':active?'var(--violet)':err?'var(--rose)':'var(--dim)';
            return(
              <div key={ph.id} style={{
                display:'flex',alignItems:'center',gap:4,padding:'0 10px',
                borderBottom:active?'2px solid var(--violet)':done?'2px solid var(--cyan)':'2px solid transparent',
                transition:'all .3s',minWidth:0,flex:'0 0 auto'}}>
                <span style={{fontSize:11,opacity:done||active?1:.3}}>{ph.icon}</span>
                <div>
                  <div style={{fontSize:8,fontWeight:700,color:c,lineHeight:1.1,letterSpacing:'.04em'}}>
                    {active&&mcpRunning&&'⟳ '}{ph.name}
                  </div>
                  <div style={{fontSize:6,color:done?'var(--cyan)':active?'var(--violet)':'var(--dim)',letterSpacing:'.06em'}}>{ph.tech}</div>
                </div>
                {i<7&&<div style={{width:12,height:1,background:done?'var(--cyan)':'var(--bdr)',marginLeft:4,flexShrink:0}}/>}
              </div>);
          })}
        </div>)}

      {/* LLM STATUS BANNER — shows Claude health, active provider, fallback status */}
      {llmStatus&&(
        <div style={{flexShrink:0,display:'flex',alignItems:'center',gap:12,padding:'4px 18px',
          background: llmStatus.claude_balance_ok
            ? 'rgba(0,212,170,.04)'
            : 'rgba(255,176,32,.08)',
          borderBottom:`1px solid ${llmStatus.claude_balance_ok?'rgba(0,212,170,.15)':'rgba(255,176,32,.35)'}`,
          fontSize:8}}>
          {/* Active provider */}
          <div style={{display:'flex',alignItems:'center',gap:4,borderRight:'1px solid rgba(255,255,255,.06)',paddingRight:10,marginRight:4}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:provider==='claude'?'var(--cyan)':'var(--green)',boxShadow:`0 0 6px ${provider==='claude'?'var(--cyan)':'var(--green)'}`}}/>
            <span style={{fontSize:8.5,fontWeight:700,color:provider==='claude'?'var(--cyan)':'var(--green)'}}>
              {provider==='claude'?(llmStatus.claude_balance_ok?'Claude':'Ollama⚡'):'Ollama'}
            </span>
            <span style={{fontSize:7,color:'var(--mut)'}}>
              {provider==='claude'?(llmStatus.claude_balance_ok?'active':'fallback active'):'local active'}
            </span>
          </div>
          {/* Claude status */}
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:5,height:5,borderRadius:'50%',
              background: llmStatus.claude_balance_ok&&llmStatus.anthropic_key_set
                ?'var(--cyan)':'var(--amber)'}}/>
            <span style={{color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.12em'}}>Claude</span>
            <span style={{fontWeight:700,color: llmStatus.claude_balance_ok&&llmStatus.anthropic_key_set
              ?'var(--cyan)':'var(--amber)'}}>
              {!llmStatus.anthropic_key_set?'NO KEY SET'
                :llmStatus.claude_balance_ok?`${llmStatus.claude_model} · active`
                :'CREDIT EXHAUSTED → Ollama fallback'}
            </span>
          </div>
          <div style={{color:'var(--dim)'}}>|</div>
          {/* Token budget */}
          <div style={{color:'var(--mut)'}}>
            Budget: <span style={{color:'var(--txt)',fontWeight:600}}>
              ≤{llmStatus.max_input_tokens} in / ≤{llmStatus.max_output_tokens} out tokens
            </span>
          </div>
          <div style={{color:'var(--dim)'}}>|</div>
          {/* Rate limit */}
          <div style={{color:'var(--mut)'}}>
            Rate: <span style={{color:'var(--txt)',fontWeight:600}}>
              ≤{(60/llmStatus.rate_limit_interval_s).toFixed(0)} RPM · ≥{llmStatus.rate_limit_interval_s}s between calls
            </span>
          </div>
          <div style={{color:'var(--dim)'}}>|</div>
          {/* Ollama status */}
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:'var(--green)'}}/>
            <span style={{color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.12em'}}>Ollama</span>
            <span style={{fontWeight:700,color:'var(--green)'}}>{llmStatus.ollama_model} · ready</span>
          </div>
          <div style={{color:'var(--dim)'}}>|</div>
          {/* Genie Diff status */}
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:llmStatus.genie_diff_available?'var(--cyan)':'var(--mut)'}}/>
            <span style={{color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.12em'}}>Genie Diff</span>
            <span style={{fontWeight:700,color:llmStatus.genie_diff_available?'var(--cyan)':'var(--mut)'}}>
              {llmStatus.genie_diff_available?'ready':'no pyATS'}
            </span>
          </div>
          <div style={{color:'var(--dim)'}}>|</div>
          {/* Netmiko status */}
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:llmStatus.netmiko_available?'var(--green)':'var(--mut)'}}/>
            <span style={{color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.12em'}}>Netmiko SSH</span>
            <span style={{fontWeight:700,color:llmStatus.netmiko_available?'var(--green)':'var(--mut)'}}>
              {llmStatus.netmiko_available?'ready':'not installed'}
            </span>
          </div>
          {/* Credit warning */}
          {!llmStatus.claude_balance_ok&&(
            <>
              <div style={{color:'var(--dim)'}}>|</div>
              <span style={{color:'var(--amber)',fontWeight:700}}>
                ⚠ Add credits at console.anthropic.com — pipeline running on Ollama
              </span>
              <button onClick={async()=>{
                  await fetch(`${API}/reset_claude`,{method:'POST'});
                  pollLlmStatus();
                }}
                style={{background:'transparent',border:'1px solid var(--amber)',borderRadius:2,
                  color:'var(--amber)',cursor:'pointer',fontSize:7,padding:'2px 6px',marginLeft:4}}>
                Reset
              </button>
            </>
          )}
        </div>
      )}

      {/* MAIN */}
      <div className="main" style={{flex:1,overflow:'hidden'}}>

        {/* LEFT: INTENT + DISCOVERY STATUS + CRITICAL NODES + LOGS */}
        <div className="col">
          <div className="ph">
            <div className="pt">Change Intent</div>
            <div className="ptag" style={{background:'rgba(0,212,170,.1)',color:'var(--cyan)'}}>CLI</div>
          </div>
          <div style={{padding:'10px 11px',flexShrink:0}}>
            <textarea className="intent-ta" value={intent} onChange={e=>setIntent(e.target.value)} rows={5}
              placeholder="Cisco IOS CLI commands to apply..."/>
          </div>

          {/* Discovery status */}
          {savedInvMeta&&(
            <div className="disc-status">
              <div className="disc-dot"></div>
              <div>
                <div style={{fontWeight:600}}>Inventory Saved — {savedInvMeta.interface_count} interfaces</div>
                <div style={{color:'rgba(0,230,118,.6)',fontSize:7}}>{savedInvMeta.timestamp} · Pipeline will use cached data</div>
              </div>
              <button onClick={async()=>{
                  await fetch(`${API}/clear_inventory`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({port})});
                  setSavedInvMeta(null);addLogs(['[DISCOVER] Inventory cache cleared.']);
                }}
                style={{marginLeft:'auto',background:'transparent',border:'1px solid rgba(255,69,96,.3)',borderRadius:2,color:'var(--rose)',cursor:'pointer',fontSize:7,padding:'2px 6px'}}>
                Clear
              </button>
            </div>
          )}

          {/* Intent-mode anomaly button */}
          <div style={{padding:'0 11px 8px',flexShrink:0,display:'flex',gap:6}}>
            <button className={`btn btn-anom`} style={{flex:1,height:26,fontSize:9}}
              onClick={()=>scanAnomalies(true)} disabled={anomRunning||running}
              title="Run anomaly scan correlated with intent [Ollama]">
              {anomRunning?'⬡ SCANNING...':'⚠ ANOMALIES + INTENT [Ollama]'}
            </button>
          </div>

          {/* Critical nodes */}
          {result?.critical_nodes?.length>0&&(
            <div style={{padding:'0 11px 8px',flexShrink:0}}>
              <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:5}}>Critical Nodes</div>
              {result.critical_nodes.slice(0,5).map(n=>(
                <div key={n.id} style={{display:'flex',gap:6,alignItems:'flex-start',marginBottom:3,padding:'3px 7px',background:'var(--pan)',border:'1px solid var(--bdr)',borderRadius:3}}>
                  <div style={{width:4,height:4,borderRadius:'50%',background:'var(--rose)',flexShrink:0,marginTop:4}}></div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:8.5,color:'#fff',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.id}</div>
                    <div style={{height:2,borderRadius:2,background:'var(--rose)',width:`${(n.criticality||0)*100}%`,marginTop:2}}></div>
                  </div>
                  <div style={{fontSize:8.5,color:'var(--rose)',fontWeight:700,flexShrink:0}}>{((n.criticality||0)*100).toFixed(0)}%</div>
                </div>))}
            </div>
          )}

          {/* Activity log */}
          <div className="ph" style={{borderTop:'1px solid var(--bdr)'}}>
            <div className="pt">Activity Log</div>
            <div style={{fontSize:7,color:'var(--mut)'}}>{logs.length} lines</div>
          </div>
          <div className="pb">
            {logs.map((line,i)=><div key={i} className={`log-ln ${lc(line)}`}>{line}</div>)}
            <div ref={logEndRef}/>
          </div>
        </div>

        {/* CENTER: MAIN TABS */}
        <div className="col" style={{display:'flex',flexDirection:'column'}}>
          <div className="tabbar">
            {MAIN_TABS.map(t=>(
              <button key={t} className={`tab${activeTab===t?' active':''}`} onClick={()=>setActiveTab(t)}>{t}</button>
            ))}
          </div>

          {/* ── DECISION ── */}
          {activeTab==='decision'&&(
            <div className="pb">
              {!parsed
                ?<div className="empty">
                    {result?.decision&&/^(Ollama Error:|Claude Error:)/i.test(result.decision.trim())
                      ?<><div className="empty-hex" style={{color:'var(--rose)'}}>⚠</div>
                          <div className="empty-t" style={{color:'var(--rose)'}}>LLM Timeout — Stage 5</div>
                          <div className="empty-s" style={{color:'var(--amber)',wordBreak:'break-all',maxWidth:320}}>{result.decision.slice(0,180)}</div>
                          <div className="empty-s" style={{marginTop:6,color:'var(--mut)'}}>Tip: switch to provider: <strong>claude</strong>, or reduce Ollama load</div></>
                      :<><div className="empty-hex">⬡</div><div className="empty-t">Awaiting Analysis</div>
                          <div className="empty-s">Run Pipeline to get impact-aware decision</div></>
                    }
                  </div>
                :<>
                  <div className={`dc ${vc}`}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                      <div className="dv">{parsed.verdict}</div>
                      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:22,fontWeight:700,color:rc(parsed.riskScore),lineHeight:1}}>
                        {parsed.riskScore}<span style={{fontSize:9,color:'var(--mut)'}}>/10</span>
                      </div>
                    </div>
                    {parsed.summary&&<div style={{fontSize:8.5,lineHeight:1.6,color:'var(--txt)'}}>{parsed.summary}</div>}
                  </div>

                  <div style={{marginBottom:9}}>
                    <div className="rtk"><div className="rf" style={{width:`${parsed.riskScore*10}%`,background:rc(parsed.riskScore)}}></div></div>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:7,color:'var(--mut)',marginTop:2}}><span>Safe</span><span>Critical</span></div>
                  </div>

                  {/* Classification badges */}
                  {result?.classification&&(
                    <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:9}}>
                      {[[result.classification.operation,{ADD:'var(--green)',DELETE:'var(--rose)',MODIFY:'var(--amber)'}[result.classification.operation]||'var(--mut)'],
                        [result.classification.protocol,'var(--cyan)'],
                        [`Scope: ${result.classification.scope}`,'var(--violet)'],
                        [`Rev: ${result.classification.reversible}`,result.classification.reversible==='YES'?'var(--green)':result.classification.reversible==='NO'?'var(--rose)':'var(--amber)'],
                      ].filter(([l])=>l&&!l.includes('undefined')).map(([label,color])=>(
                        <span key={label} style={{fontSize:7,fontWeight:700,padding:'2px 6px',borderRadius:2,textTransform:'uppercase',letterSpacing:'.1em',
                          background:`${color}1f`,
                          border:`1px solid ${color}47`,color}}>{label}</span>
                      ))}
                    </div>
                  )}

                  {/* Impact domains */}
                  {parsed.impacts&&Object.keys(parsed.impacts).length>0&&(
                    <div style={{marginBottom:9}}>
                      <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:5}}>Impact Assessment</div>
                      {[['customer_reachability','Customer Reachability','👥'],['routing_convergence','Routing Convergence','🔄'],['network_announcement','Network Announcement','📡'],
                        ['redundancy','Redundancy','🔀'],['policy','Policy / ACL','📋'],['service_continuity','Service Continuity','⚡'],['blast_radius_dom','Blast Radius','💥']].map(([key,label,icon])=>{
                        const d=parsed.impacts[key]; if(!d) return null;
                        const sc={IMPACTED:'var(--rose)',NOT_IMPACTED:'var(--green)',UNKNOWN:'var(--amber)'}[d.status]||'var(--mut)';
                        return(
                          <div key={key} className="imp-row">
                            <span style={{fontSize:11}}>{icon}</span>
                            <div>
                              <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:1}}>{label}</div>
                              <div style={{fontSize:8.5,color:'var(--txt)',lineHeight:1.5}}>{d.detail}</div>
                            </div>
                            <span style={{fontSize:7,fontWeight:700,padding:'2px 5px',borderRadius:2,textTransform:'uppercase',whiteSpace:'nowrap',alignSelf:'start',
                              background:`${sc}1f`,border:`1px solid ${sc}40`,color:sc}}>
                              {d.status.replace('_',' ')}
                            </span>
                          </div>);
                      })}
                    </div>
                  )}

                  {/* CLI lines */}
                  {result?.classification?.config_lines_classified?.length>0&&(
                    <div style={{marginBottom:9}}>
                      <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:5}}>CLI Lines Classified</div>
                      {result.classification.config_lines_classified.map((cl,i)=>(
                        <div key={i} style={{display:'flex',gap:7,padding:'4px 7px',background:'var(--pan)',border:'1px solid var(--bdr)',
                          borderLeft:`3px solid ${cl.destructive?'var(--rose)':'var(--green)'}`,borderRadius:'0 3px 3px 0',marginBottom:3}}>
                          <code style={{fontSize:8,color:cl.destructive?'var(--rose)':'var(--cyan)',flex:'0 0 auto',minWidth:140}}>{cl.line}</code>
                          <span style={{fontSize:8,color:'var(--mut)'}}>{cl.action}</span>
                        </div>))}
                    </div>
                  )}

                  {/* Blast radius */}
                  {result?.blast_radius&&(
                    <div style={{marginBottom:9,background:'var(--pan)',border:'1px solid var(--bdr)',borderRadius:3,padding:'8px 10px'}}>
                      <div style={{fontSize:7,color:'var(--rose)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:5}}>💥 Blast Radius</div>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5,marginBottom:5}}>
                        {[['Direct',result.blast_radius.directly_affected_prefixes],['Downstream',result.blast_radius.downstream_prefix_count],['Crit Nodes',result.blast_radius.critical_nodes_hit]].map(([l,v])=>(
                          <div key={l} style={{textAlign:'center'}}>
                            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:17,fontWeight:700,color:v>0?'var(--rose)':'var(--green)',lineHeight:1}}>{v}</div>
                            <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.07em',marginTop:2}}>{l}</div>
                          </div>))}
                      </div>
                      {result.blast_radius.downstream_prefixes_sample?.length>0&&<div style={{fontSize:8,color:'var(--mut)'}}>Affected: {result.blast_radius.downstream_prefixes_sample.join(', ')}</div>}
                    </div>
                  )}

                  {parsed.execSteps.length>0&&(
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:5}}>Execution Plan</div>
                      {parsed.execSteps.map((s,i)=>(
                        <div key={i} style={{display:'flex',gap:6,padding:'4px 0',borderBottom:'1px solid var(--bdr)',fontSize:8.5}}>
                          <span style={{color:'var(--cyan)',fontWeight:700,flexShrink:0}}>{i+1}.</span><span>{s}</span>
                        </div>))}
                    </div>
                  )}

                  {parsed.rollback.length>0&&(
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:7,color:'var(--rose)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:5}}>⚠ Rollback</div>
                      {parsed.rollback.map((s,i)=>(
                        <div key={i} style={{display:'flex',gap:6,padding:'4px 0',borderBottom:'1px solid var(--bdr)',fontSize:8.5}}>
                          <span style={{color:'var(--rose)',fontWeight:700,flexShrink:0}}>{i+1}.</span><span>{s}</span>
                        </div>))}
                    </div>
                  )}

                  {parsed.reasoning&&(
                    <div>
                      <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:5}}>Technical Reasoning</div>
                      <div style={{fontSize:8.5,lineHeight:1.7,color:'var(--txt)'}}>{parsed.reasoning}</div>
                    </div>
                  )}
                </>}
            </div>
          )}

          {/* ── TOPOLOGY ── */}
          {activeTab==='topology'&&(
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              {result&&(
                <div style={{flexShrink:0,display:'flex',gap:4,padding:'6px 11px',borderBottom:'1px solid var(--bdr)',flexWrap:'wrap'}}>
                  {[['CDP',(result.inventory?.cdp_neighbors||[]).length,'var(--blue)'],
                    ['LLDP',(result.inventory?.lldp_neighbors||[]).length,'var(--violet)'],
                    ['OSPF Nbrs',(result.inventory?.protocols?.ospf?.neighbors||[]).length,'var(--amber)'],
                    ['Nodes',result.topology?.graph_stats?.node_count,'var(--cyan)'],
                    ['Edges',result.topology?.graph_stats?.edge_count,'var(--green)'],
                    ['Density',result.topology?.graph_stats?.density,'var(--mut)'],
                  ].map(([l,v,c])=>(
                    <div key={l} style={{background:'var(--pan)',border:'1px solid var(--bdr)',borderRadius:3,padding:'4px 7px',minWidth:52}}>
                      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:15,fontWeight:700,color:c,lineHeight:1}}>{v??'—'}</div>
                      <div style={{fontSize:6.5,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.08em',marginTop:2}}>{l}</div>
                    </div>))}
                </div>
              )}
              <TopoViz physTopo={result?.physical_topology} igraphTopo={result?.topology} critNodes={result?.critical_nodes}/>
            </div>
          )}

          {/* ── SIMULATE ── */}
          {activeTab==='simulate'&&<SimPanel simResult={simResult}/>}

          {/* ── MCP PIPELINE ── */}
          {activeTab==='mcp'&&<McpPanel mcpResult={mcpResult}/>}
          {activeTab==='agents'&&<AgentPanel agentData={agentResult} pipelineResult={mcpResult}/>}

          {/* ── ANOMALY ── */}
          {activeTab==='anomaly'&&<AnomalyPanel anomalyResult={anomalyResult}/>}

          {/* ── HEALING ── */}
          {activeTab==='healing'&&(
            <div className="pb">
              {!result?.audit_trail
                ?<div className="empty"><div className="empty-hex">⬡</div><div className="empty-t">No Healing Data</div></div>
                :<>{result.audit_trail.map(a=>(
                  <div key={a.iteration} style={{background:'var(--pan)',border:'1px solid var(--bdr)',borderRadius:3,padding:'7px 9px',marginBottom:5}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                      <span style={{fontSize:8,color:'var(--mut)'}}>Iteration {a.iteration}</span>
                      <div style={{display:'flex',gap:7,alignItems:'center'}}>
                        <span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:15,fontWeight:700,color:a.risk_score<.3?'var(--green)':a.risk_score<.6?'var(--amber)':'var(--rose)',lineHeight:1}}>{(a.risk_score*100).toFixed(1)}%</span>
                        <span style={{fontSize:8,color:a.accepted?'var(--green)':'var(--amber)'}}>{a.accepted?'✓ ACCEPTED':'↺ RETRY'}</span>
                      </div>
                    </div>
                    <div style={{fontSize:8,color:'var(--mut)',background:'var(--bg)',padding:'5px',borderRadius:2,whiteSpace:'pre-wrap',wordBreak:'break-all'}}>
                      {(a.proposed||'').slice(0,280)}{(a.proposed||'').length>280?'...':''}
                    </div>
                  </div>))}
                </>}
            </div>
          )}

          {/* ── VALIDATION ── */}
          {activeTab==='validation'&&(
            <div className="pb">
              {!result?.validation
                ?<div className="empty"><div className="empty-hex">⬡</div><div className="empty-t">No Validation Data</div></div>
                :<>
                  <div style={{display:'flex',gap:5,marginBottom:9}}>
                    {[[result.validation.issues.length,'Issues','var(--rose)'],[result.validation.warnings.length,'Warnings','var(--amber)'],[result.validation.passed.length,'Passed','var(--green)']].map(([count,label,color])=>(
                      <div key={label} style={{flex:1,background:'var(--pan)',border:`1px solid ${color}33`,borderRadius:3,padding:'7px 8px',textAlign:'center'}}>
                        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:22,fontWeight:700,color,lineHeight:1}}>{count}</div>
                        <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.1em',marginTop:2}}>{label}</div>
                      </div>))}
                  </div>
                  <div style={{background:result.validation.safe_to_proceed?'rgba(0,230,118,.06)':'rgba(255,69,96,.06)',
                    border:`1px solid ${result.validation.safe_to_proceed?'rgba(0,230,118,.3)':'rgba(255,69,96,.3)'}`,
                    borderRadius:3,padding:'8px 10px',marginBottom:9,fontSize:9.5,fontWeight:600,
                    color:result.validation.safe_to_proceed?'var(--green)':'var(--rose)'}}>
                    {result.validation.safe_to_proceed?'✓ SAFE TO PROCEED':'✕ BLOCKED — Resolve issues before pushing config'}
                  </div>

                  {/* Variables from device twin */}
                  {(result.validation.device_iface_ips?.length||result.validation.device_routing_ips?.length)&&(
                    <div style={{marginBottom:9,padding:'8px 9px',background:'var(--pan)',border:'1px solid var(--bdr)',borderRadius:3}}>
                      <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.15em',marginBottom:5}}>Variables Checked Against Device Twin</div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                        <div>
                          <div style={{fontSize:7,color:'var(--blue)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:3}}>Interface IPs ({(result.validation.device_iface_ips||[]).length})</div>
                          {(result.validation.device_iface_ips||[]).slice(0,8).map((ip,i)=><div key={i} style={{fontSize:8,color:'var(--cyan)',padding:'1px 0'}}>{ip}</div>)}
                          {(result.validation.device_iface_ips||[]).length>8&&<div style={{fontSize:7,color:'var(--mut)'}}>+{(result.validation.device_iface_ips||[]).length-8} more</div>}
                        </div>
                        <div>
                          <div style={{fontSize:7,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:3}}>Routing IPs ({(result.validation.device_routing_ips||[]).length})</div>
                          {(result.validation.device_routing_ips||[]).slice(0,8).map((ip,i)=><div key={i} style={{fontSize:8,color:'var(--amber)',padding:'1px 0'}}>{ip}</div>)}
                        </div>
                      </div>
                    </div>
                  )}

                  {[[result.validation.issues,'✕ Issues','var(--rose)'],[result.validation.warnings,'⚠ Warnings','var(--amber)'],[result.validation.passed,'✓ Passed','var(--green)']].map(([items,label,color])=>
                    items?.length>0&&(
                      <div key={label} style={{marginBottom:8}}>
                        <div style={{fontSize:7,color,textTransform:'uppercase',letterSpacing:'.15em',marginBottom:4}}>{label} ({items.length})</div>
                        {items.map((item,i)=>(
                          <div key={i} className="vi">
                            <div className="vdot" style={{background:color}}></div><span>{item}</span>
                          </div>))}
                      </div>))}
                </>}
            </div>
          )}

          {/* ── CONFIG ── */}
          {activeTab==='config'&&(
            <div className="pb">
              {!result?.healed_config
                ?<div className="empty"><div className="empty-hex">⬡</div><div className="empty-t">No Healed Config</div></div>
                :<>
                  <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:6}}>Recursively Healed Configuration</div>
                  <pre style={{fontSize:9.5,color:'#7ee787',background:'#060a0f',border:'1px solid var(--bdr2)',borderRadius:3,padding:10,whiteSpace:'pre-wrap',wordBreak:'break-all',marginBottom:9,lineHeight:1.7}}>{result.healed_config}</pre>
                  {result.used_saved_inventory&&<div style={{fontSize:8,color:'var(--cyan)',padding:'4px 0'}}>ℹ Stages 1-2 used cached inventory — collection was skipped.</div>}
                </>}
            </div>
          )}

          {/* ── TWIN ── */}
          {activeTab==='twin'&&(
            <div className="pb">
              {!result?.digital_twin
                ?<div className="empty"><div className="empty-hex">⬡</div><div className="empty-t">No Digital Twin</div></div>
                :<pre style={{fontSize:7,color:'var(--amber)',lineHeight:1.6,whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{JSON.stringify(result.digital_twin,null,2)}</pre>}
            </div>
          )}

          {/* ── INVENTORY ── */}
          {activeTab==='inventory'&&(
            <InventoryPanel inventory={result?.inventory} twin={result?.digital_twin}/>
          )}

          {activeTab==='chat'&&(
            <ChatPanel analysisContext={chatContext} port={port}/>
          )}
        </div>

        {/* RIGHT: IGRAPH METRICS + RAW LLM */}
        <div className="col">
          <div className="ph"><div className="pt">Topology Metrics</div><div className="ptag" style={{background:'rgba(124,92,252,.1)',color:'var(--violet)'}}>iGraph</div></div>
          <div className="pb" style={{flex:'0 0 auto',maxHeight:250}}>
            {result?.topology
              ?<>
                <div className="mg">
                  {[['Nodes',result.topology.graph_stats?.node_count,'var(--cyan)'],['Edges',result.topology.graph_stats?.edge_count,'var(--blue)'],
                    ['Density',result.topology.graph_stats?.density,'var(--violet)'],['Avg Deg',result.topology.graph_stats?.avg_degree,'var(--amber)']].map(([l,v,c])=>(
                    <div key={l} className="mc"><div className="mv" style={{color:c}}>{v??'—'}</div><div className="ml">{l}</div></div>))}
                </div>
                <div style={{fontSize:7,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:5}}>Centrality Table</div>
                <div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 38px 32px 38px',gap:2,color:'var(--mut)',borderBottom:'1px solid var(--bdr)',paddingBottom:4,marginBottom:4,fontSize:7}}>
                    <span>Node</span><span style={{textAlign:'right'}}>Crit</span><span style={{textAlign:'right'}}>Deg</span><span style={{textAlign:'right'}}>PR</span>
                  </div>
                  {[...(result.topology.nodes||[])].sort((a,b)=>b.criticality-a.criticality).map(n=>(
                    <div key={n.id} style={{display:'grid',gridTemplateColumns:'1fr 38px 32px 38px',gap:2,padding:'2px 0',borderBottom:'1px solid rgba(28,40,54,.3)',fontSize:8}}>
                      <span style={{color:'var(--txt)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.id}</span>
                      <span style={{textAlign:'right',color:n.criticality>.6?'var(--rose)':n.criticality>.3?'var(--amber)':'var(--green)',fontWeight:700,fontSize:7}}>{(n.criticality*100).toFixed(0)}%</span>
                      <span style={{textAlign:'right',color:'var(--mut)',fontSize:7}}>{n.degree}</span>
                      <span style={{textAlign:'right',color:'var(--mut)',fontSize:7}}>{n.pagerank?.toFixed(3)}</span>
                    </div>))}
                </div>
              </>
              :<div className="empty" style={{minHeight:80}}><div className="empty-hex">⬡</div><div className="empty-t">No Metrics</div></div>
            }
          </div>

          <div className="ph" style={{borderTop:'1px solid var(--bdr)'}}><div className="pt">Raw LLM Output</div><div className="ptag" style={{background:'rgba(0,230,118,.1)',color:'var(--green)'}}>Stage 5</div></div>
          <div className="pb">
            {result?.decision
              ?<div style={{fontSize:7.5,lineHeight:1.7,color:'var(--mut)',whiteSpace:'pre-wrap'}}>{result.decision}</div>
              :<div style={{fontSize:8,color:'var(--dim)',fontStyle:'italic'}}>// LLM reasoning will appear here after pipeline.</div>}
          </div>
        </div>

      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
